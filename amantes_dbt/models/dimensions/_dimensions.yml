version: 2
models:
  # --------------------------------------------------
  # PRODUCT DIMENSION
  # --------------------------------------------------
  - name: dim_product
    description: "Master dimension for Amante's Coffee Shop menu items and variations."
    columns:
      - name: product_key
        description: "Primary key (MD5 hash of item, variation, and size)."
        tests:
          - unique
          - not_null
      - name: category
        description: "High-level product category."
        tests:
          - not_null
          - accepted_values:
              config:
                values: ['Beverages', 'Food', 'Desserts', 'Add-ons', 'Others']
                quote: true
      - name: items
        description: "The specific name of the product (e.g., Oreo Matcha)."
        tests:
          - not_null
  # --------------------------------------------------
  # DATE DIMENSION
  # --------------------------------------------------
  - name: dim_date
    description: "Standard calendar dimension table."
    columns:
      - name: date_key
        description: "Integer representation of the date (YYYYMMDD)."
        tests:
          - unique
          - not_null
      - name: day_of_week
        description: "Text name of the day (Monday, Tuesday, etc.)."
        tests:
          - accepted_values:
              config:
                values: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday']
      - name: is_weekend
        description: "Boolean flag indicating if the day falls on a weekend."
        tests:
          - not_null
  # --------------------------------------------------
  # ATTRIBUTE DIMENSIONS (Flavor, Spice, Sugar)
  # --------------------------------------------------
  - name: dim_flavor
    description: "Available flavor syrups and shots."
    columns:
      - name: flavor_key
        tests:
          - unique
          - not_null
      - name: flavor_name
        tests:
          - not_null
          - accepted_values:
              config:
                values: ['Mango', 'No Flavor', 'BBQ', 'Plain', 'Bbq', 'Cheese', 'Sour Cream']
  - name: dim_spice_level
    description: "Spice level options for food items."
    columns:
      - name: spice_level_key
        tests:
          - unique
          - not_null
      - name: spice_level
        tests:
          - not_null
          - accepted_values:
              config:
                values: ['No Spice Level', 'Mild (1/4)', 'Regular (2/4)', 'Spicy (3/4)', 'Extra Spicy (4/4)']
  - name: dim_sugar_levels
    description: "Sugar level preferences for beverages."
    columns:
      - name: sugar_level_key
        tests:
          - unique
          - not_null
      - name: sugar_level
        tests:
          - not_null
  # --------------------------------------------------
  # TRANSACTIONAL DIMENSIONS (Payment & Order Type)
  # --------------------------------------------------
  - name: dim_payment_type
    description: "Methods of payment accepted at the register."
    columns:
      - name: payment_type_key
        tests:
          - unique
          - not_null
      - name: payment_type
        description: "The tender type used for the transaction."
        tests:
          - not_null
  - name: dim_order_type
    description: "The channel through which the order was placed."
    columns:
      - name: order_type_key
        tests:
          - unique
          - not_null
      - name: order_type
        description: "Fulfillment method (e.g., Dine-in, Takeout, or 3rd Party)."
        tests:
          - not_null