version: 2

sources:
  - name: quarantine
    database: pos-pipeline-airflow
    schema: pos_data
    tables:
      - name: fact_sales_quarantine
        description: "Quarantine table for rows that failed validation during extraction."
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns:
                - order_id
                - items
                - flavor
                - size
                - variant
                - payment_time
              config:
                severity: error
        columns:
          - name: order_id
            tests:
              - not_null